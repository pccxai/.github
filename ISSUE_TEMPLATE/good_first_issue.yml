name: Good first issue
description: Maintainers — file a contributor-friendly task with explicit scope, expected output, and validation steps.
title: "[good first issue] "
labels: ["good first issue", "help wanted", "status:ready"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form **only if you are a maintainer** scoping work for a first-time contributor. New contributors should comment on an existing `good first issue` instead of opening a new one.

        Each section below should be filled in concretely. Vague issues discourage contribution.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One paragraph. What is the change and why is it useful?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Bullet list of what is in scope. Be explicit about file paths and limits (e.g., "< 60 lines", "single new file").
      placeholder: |
        - Edit `path/to/file.md`.
        - Add one new section under "Examples".
        - Keep the change under 50 lines.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: What deliverable closes this issue? Files added, behaviour changed, links resolving, etc.
      placeholder: |
        - A pull request that adds `CONTRIBUTING.md` at the repo root.
        - Links to org-wide docs work on github.com.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How does the contributor (and reviewer) verify the change is correct? Cite the project's actual checks (e.g. `make strict`, `cargo fmt --check`, `repo-validate`).
      placeholder: |
        - `make strict` passes with zero warnings.
        - `npm run lint` is clean.
        - File renders correctly on github.com.
    validations:
      required: true
  - type: textarea
    id: pointers
    attributes:
      label: Pointers
      description: Optional. Links to related PRs, similar prior work, or specific files to read first.
  - type: markdown
    attributes:
      value: |
        New here? Read the [organisation contributing guide](https://github.com/pccxai/.github/blob/main/CONTRIBUTING.md) before opening a pull request, and feel free to ask in [Discussions](https://github.com/pccxai/pccx/discussions) if anything is unclear.
