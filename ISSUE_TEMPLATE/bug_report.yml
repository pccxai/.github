name: Bug report
description: Report a defect that affects published behaviour, builds, or documentation.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please file a bug report only for issues that affect published behaviour, builds, or documentation. For questions or design discussions, use Discussions instead.
  - type: input
    id: version
    attributes:
      label: Affected version or commit
      description: Tag, release, or commit SHA where the bug was observed.
      placeholder: "v0.1.0 or commit abc1234"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Observed behaviour
      description: What happens?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or actions to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, toolchain versions, target hardware where relevant.
      placeholder: "Ubuntu 24.04, rustc 1.75, KV260, ..."
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste log excerpts inside a fenced code block.
      render: shell
